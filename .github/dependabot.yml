version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:00'
      timezone: 'Europe/Paris'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 20
    groups:
      github-actions:
        patterns:
          - '*'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '05:00'
      timezone: 'Europe/Paris'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 20
    groups:
      github-actions:
        patterns:
          - '*'
